name: Flutter formatter pass

on:
  push:
    branches: [agent/flutter-unified-stress-studio]
    paths:
      - apps/stress_studio/lib/**
      - apps/stress_studio/test/**
      - .github/workflows/flutter-format-once.yml

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/flutter-unified-stress-studio
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - name: Apply canonical Dart formatting
        working-directory: apps/stress_studio
        run: dart format lib test
      - name: Commit formatter output
        shell: bash
        run: |
          if git diff --quiet -- apps/stress_studio/lib apps/stress_studio/test; then
            echo 'No formatter changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/stress_studio/lib apps/stress_studio/test
          git commit -m 'Format Flutter sources'
          git push origin HEAD:agent/flutter-unified-stress-studio
