name: Compute Stress Studio

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to create or update
        required: true
        default: stress-studio-v0.2.0
        type: string
      release_title:
        description: Human-readable release title
        required: true
        default: Compute Stress Studio preview 0.2.0
        type: string
      release_notes_file:
        description: Repository-relative Markdown release notes file
        required: true
        default: docs/releases/NEXT.md
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: true
        type: boolean
  push:
    branches: [main]
    paths: &flutter-studio-paths
      - apps/stress_studio/**
      - native-juce/**
      - docs/FLUTTER_STRESS_STUDIO_SPEC.md
      - docs/JUCE_WAVEMIX_BACKUP_GUIDE.md
      - docs/RELEASES.md
      - README.md
      - .github/workflows/flutter-stress-studio.yml
  pull_request:
    paths: *flutter-studio-paths

permissions:
  contents: write

concurrency:
  group: compute-stress-studio-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FLUTTER_VERSION: '3.44.0'
  CUDA_VERSION: '12.6.3'
  APP_DIR: apps/stress_studio

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Generate desktop scaffolding
        working-directory: ${{ env.APP_DIR }}
        run: flutter create --platforms=windows,linux --org com.pme26elvis --project-name stress_studio .
      - name: Resolve dependencies
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get
      - name: Verify formatting
        working-directory: ${{ env.APP_DIR }}
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        working-directory: ${{ env.APP_DIR }}
        run: flutter analyze
      - name: Test
        working-directory: ${{ env.APP_DIR }}
        run: flutter test --coverage

  windows-package:
    runs-on: windows-2022
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: local
      - name: Generate Windows scaffolding
        working-directory: ${{ env.APP_DIR }}
        shell: pwsh
        run: flutter create --platforms=windows --org com.pme26elvis --project-name stress_studio .
      - name: Build JUCE GPU worker
        shell: pwsh
        run: |
          cmake -S native-juce -B build/flutter-juce-windows `
            -G "Visual Studio 17 2022" -A x64 `
            -DGPU_STRESS_ENABLE_CUDA=ON `
            -DGPU_STRESS_BUILD_GUI=ON `
            -DGPU_STRESS_BUILD_TESTS=ON `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build/flutter-juce-windows --config Release --parallel 2
          ctest --test-dir build/flutter-juce-windows -C Release --output-on-failure
      - name: Build Flutter Windows release
        working-directory: ${{ env.APP_DIR }}
        shell: pwsh
        run: |
          flutter pub get
          flutter build windows --release
      - name: Assemble Windows bundle
        shell: pwsh
        run: |
          $source = Join-Path $PWD "apps\stress_studio\build\windows\x64\runner\Release"
          $bundle = Join-Path $PWD "dist\Compute-Stress-Studio-Windows-x64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item "$source\*" $bundle -Recurse -Force
          $worker = Get-ChildItem build\flutter-juce-windows -Recurse -Filter "GPU-Stress-JUCE.exe" | Select-Object -First 1
          if (-not $worker) { throw "JUCE GPU worker was not found" }
          Copy-Item $worker.FullName (Join-Path $bundle "GPU-Stress-JUCE-Background.exe")
          Copy-Item README.md $bundle
          Copy-Item docs\FLUTTER_STRESS_STUDIO_SPEC.md $bundle
          Copy-Item docs\RELEASES.md $bundle
          Copy-Item docs\JUCE_WAVEMIX_BACKUP_GUIDE.md $bundle
          Copy-Item native-juce\THIRD_PARTY_NOTICES.md $bundle
          Set-Content -Path (Join-Path $bundle "SOURCE-COMMIT.txt") -Value $env:GITHUB_SHA
          if (-not (Test-Path (Join-Path $bundle "stress_studio.exe"))) { throw "Flutter executable is missing" }
          if (-not (Test-Path (Join-Path $bundle "GPU-Stress-JUCE-Background.exe"))) { throw "GPU worker is missing" }
          Compress-Archive -Path "$bundle\*" -DestinationPath Compute-Stress-Studio-Windows-x64.zip -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: compute-stress-studio-windows
          path: Compute-Stress-Studio-Windows-x64.zip
          compression-level: 0
          retention-days: 5

  linux-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev libgl1-mesa-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: local
      - name: Generate Linux scaffolding
        working-directory: ${{ env.APP_DIR }}
        run: flutter create --platforms=linux --org com.pme26elvis --project-name stress_studio .
      - name: Build JUCE GPU worker
        run: |
          cmake -S native-juce -B build/flutter-juce-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGPU_STRESS_ENABLE_CUDA=ON \
            -DGPU_STRESS_BUILD_GUI=ON \
            -DGPU_STRESS_BUILD_TESTS=ON
          cmake --build build/flutter-juce-linux --parallel 2
          ctest --test-dir build/flutter-juce-linux --output-on-failure
      - name: Build Flutter Linux release
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter pub get
          flutter build linux --release
      - name: Assemble Linux bundle
        run: |
          set -euo pipefail
          source_dir="$PWD/apps/stress_studio/build/linux/x64/release/bundle"
          bundle="$PWD/dist/Compute-Stress-Studio-Linux-x64"
          mkdir -p "$bundle"
          cp -a "$source_dir/." "$bundle/"
          worker="$(find build/flutter-juce-linux -type f -name GPU-Stress-JUCE -perm -111 | head -n1)"
          test -n "$worker"
          cp "$worker" "$bundle/GPU-Stress-JUCE-Background"
          cp README.md "$bundle/"
          cp docs/FLUTTER_STRESS_STUDIO_SPEC.md "$bundle/"
          cp docs/RELEASES.md "$bundle/"
          cp docs/JUCE_WAVEMIX_BACKUP_GUIDE.md "$bundle/"
          cp native-juce/THIRD_PARTY_NOTICES.md "$bundle/"
          printf '%s\n' "$GITHUB_SHA" > "$bundle/SOURCE-COMMIT.txt"
          test -x "$bundle/stress_studio"
          test -x "$bundle/GPU-Stress-JUCE-Background"
          tar -C dist -czf Compute-Stress-Studio-Linux-x64.tar.gz Compute-Stress-Studio-Linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: compute-stress-studio-linux
          path: Compute-Stress-Studio-Linux-x64.tar.gz
          compression-level: 0
          retention-days: 5

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: [quality, windows-package, linux-package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Validate release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          title="${{ inputs.release_title }}"
          notes_file="${{ inputs.release_notes_file }}"
          tag="${tag#refs/tags/}"

          if [[ ! "$tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          if [[ -z "$title" ]]; then
            echo "Release title must not be empty" >&2
            exit 1
          fi
          if [[ "$notes_file" = /* || "$notes_file" == *".."* ]]; then
            echo "release_notes_file must be a safe repository-relative path" >&2
            exit 1
          fi
          if [[ ! -f "$notes_file" ]]; then
            echo "Release notes file does not exist: $notes_file" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
          NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease="$PRERELEASE"
          else
            flags=()
            if [[ "$PRERELEASE" == "true" ]]; then flags+=(--prerelease); fi
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              "${flags[@]}"
          fi

      - name: Verify published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
