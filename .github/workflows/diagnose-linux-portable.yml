name: Diagnose Linux portable

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip setuptools wheel
          python -m pip install --quiet \
            "pyinstaller==6.21.0" \
            "cupy-cuda12x>=13,<15" \
            "nvidia-ml-py>=12,<14" \
            "nvidia-cuda-runtime-cu12>=12,<13" \
            "nvidia-cuda-nvrtc-cu12>=12,<13" \
            "nvidia-cublas-cu12>=12,<13" \
            "nvidia-nvjitlink-cu12>=12,<13"
      - name: Build and capture status
        id: build
        shell: bash
        run: |
          set +e
          python -m PyInstaller --noconfirm --clean packaging/gpu_stress_portable.spec > pyinstaller-linux.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "PyInstaller exit status: $status"
          exit 0
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-linux-log
          path: pyinstaller-linux.log
          retention-days: 3
      - name: Fail when build failed
        if: steps.build.outputs.status != '0'
        run: |
          tail -n 30 pyinstaller-linux.log
          exit 1
