name: GPU portable release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag; leave the default unless intentionally replacing a release
        required: true
        default: gpu-v0.3.0
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
  push:
    branches: [main]
    paths: &gpu-package-paths
      - gpu_stress_cli.py
      - gpu_stress_portable.py
      - gpu_stress_background.py
      - packaging/**
      - docs/QUADRO_P2200_PERSONAL_PRESET.md
      - Dockerfile.gpu
      - .dockerignore
      - docker-compose.gpu.yml
      - scripts/run_gpu_docker.*
      - .github/workflows/release-gpu-packages.yml
  pull_request:
    paths: *gpu-package-paths

permissions:
  contents: write
  packages: write

concurrency:
  group: gpu-portable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
            prerelease="${{ inputs.prerelease }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            tag="gpu-pr-${{ github.event.pull_request.number }}-${GITHUB_RUN_NUMBER}"
            prerelease="true"
          else
            tag="gpu-v0.3.${GITHUB_RUN_NUMBER}"
            prerelease="false"
          fi
          tag="${tag#refs/tags/}"
          if [[ ! "$tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  windows-portable:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install portable build dependencies
        shell: pwsh
        run: |
          python -m pip install --quiet --upgrade pip setuptools wheel
          python -m pip install --quiet `
            "pyinstaller==6.21.0" `
            "cupy-cuda12x>=13,<15" `
            "nvidia-ml-py>=12,<14" `
            "nvidia-cuda-runtime-cu12>=12,<13" `
            "nvidia-cuda-nvrtc-cu12>=12,<13" `
            "nvidia-cublas-cu12>=12,<13" `
            "nvidia-nvjitlink-cu12>=12,<13"
      - name: Build Windows worker app
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean packaging/gpu_stress_portable.spec *> pyinstaller-windows-worker.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content pyinstaller-windows-worker.log -Tail 100
            exit $LASTEXITCODE
          }
          Get-Content pyinstaller-windows-worker.log -Tail 20
      - name: Build hidden P2200 launcher
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm packaging/gpu_stress_background.spec *> pyinstaller-windows-background.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content pyinstaller-windows-background.log -Tail 100
            exit $LASTEXITCODE
          }
          Get-Content pyinstaller-windows-background.log -Tail 20
      - name: Assemble Windows personal bundle
        shell: pwsh
        run: |
          $bundle = ".\dist\GPU-Stress-Portable"
          Copy-Item "$bundle\GPU-Stress-P2200-Worker.exe" "$bundle\GPU-Stress-Portable.exe"
          Copy-Item ".\dist\GPU-Stress-P2200-Background.exe" "$bundle\GPU-Stress-P2200-Background.exe"
          Copy-Item ".\packaging\START-P2200-96H-87.cmd" "$bundle\START-P2200-96H-87.cmd"
          Copy-Item ".\packaging\STOP-P2200-GPU-STRESS.cmd" "$bundle\STOP-P2200-GPU-STRESS.cmd"
          Copy-Item ".\docs\QUADRO_P2200_PERSONAL_PRESET.md" "$bundle\QUADRO_P2200_PERSONAL_PRESET.md"
      - name: Validate Windows frozen executables
        shell: pwsh
        run: |
          .\dist\GPU-Stress-Portable\GPU-Stress-P2200-Worker.exe --help
          .\dist\GPU-Stress-Portable\GPU-Stress-Portable.exe --help
          if (-not (Test-Path .\dist\GPU-Stress-Portable\GPU-Stress-P2200-Background.exe)) {
            throw "Hidden P2200 launcher is missing"
          }
      - name: Package Windows asset
        shell: pwsh
        run: |
          $asset = "GPU-Stress-Portable-Windows-x64.zip"
          Compress-Archive -Path ".\dist\GPU-Stress-Portable\*" -DestinationPath $asset -CompressionLevel Optimal
          $size = (Get-Item $asset).Length
          Write-Host "asset_size_bytes=$size"
          if ($size -ge 2000000000) { throw "Release asset is too large for GitHub Releases" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: GPU-Stress-Portable-Windows-x64.zip
          compression-level: 0
          retention-days: 3

  linux-portable:
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install portable build dependencies
        run: |
          python -m pip install --quiet --upgrade pip setuptools wheel
          python -m pip install --quiet \
            "pyinstaller==6.21.0" \
            "cupy-cuda12x>=13,<15" \
            "nvidia-ml-py>=12,<14" \
            "nvidia-cuda-runtime-cu12>=12,<13" \
            "nvidia-cuda-nvrtc-cu12>=12,<13" \
            "nvidia-cublas-cu12>=12,<13" \
            "nvidia-nvjitlink-cu12>=12,<13"
      - name: Build Linux one-folder app
        shell: bash
        run: |
          set +e
          python -m PyInstaller --noconfirm --clean packaging/gpu_stress_portable.spec > pyinstaller-linux.log 2>&1
          status=$?
          if [[ $status -ne 0 ]]; then
            tail -n 100 pyinstaller-linux.log
            exit $status
          fi
          tail -n 20 pyinstaller-linux.log
      - name: Validate frozen Linux CLI
        run: ./dist/GPU-Stress-Portable/GPU-Stress-Portable --help
      - name: Package Linux tar archive
        run: |
          cp docs/QUADRO_P2200_PERSONAL_PRESET.md dist/GPU-Stress-Portable/QUADRO_P2200_PERSONAL_PRESET.md
          tar -C dist -czf GPU-Stress-Portable-Linux-x64.tar.gz GPU-Stress-Portable
          size="$(stat -c%s GPU-Stress-Portable-Linux-x64.tar.gz)"
          echo "tar_asset_size_bytes=$size"
          test "$size" -lt 2000000000
      - name: Build AppImage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp -a dist/GPU-Stress-Portable AppDir/usr/bin/GPU-Stress-Portable
          cp packaging/appimage/AppRun AppDir/AppRun
          cp packaging/appimage/gpu-stress.desktop AppDir/gpu-stress.desktop
          cp packaging/appimage/gpu-stress.desktop AppDir/usr/share/applications/gpu-stress.desktop
          cp packaging/appimage/gpu-stress.svg AppDir/gpu-stress.svg
          cp packaging/appimage/gpu-stress.svg AppDir/.DirIcon
          cp packaging/appimage/gpu-stress.svg AppDir/usr/share/icons/hicolor/scalable/apps/gpu-stress.svg
          chmod +x AppDir/AppRun
          curl --fail --location --retry 3 \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            --output appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            ./appimagetool-x86_64.AppImage AppDir GPU-Stress-Portable-x86_64.AppImage
          chmod +x GPU-Stress-Portable-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./GPU-Stress-Portable-x86_64.AppImage --help
          size="$(stat -c%s GPU-Stress-Portable-x86_64.AppImage)"
          echo "appimage_asset_size_bytes=$size"
          test "$size" -lt 2000000000
      - uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: |
            GPU-Stress-Portable-Linux-x64.tar.gz
            GPU-Stress-Portable-x86_64.AppImage
          compression-level: 0
          retention-days: 3

  docker-image:
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Set image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}-gpu"
          echo "name=$image" >> "$GITHUB_OUTPUT"
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          docker build \
            --file Dockerfile.gpu \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${{ needs.prepare.outputs.release_tag }}" \
            --tag "${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.release_tag }}" \
            --tag "${{ steps.image.outputs.name }}:latest" \
            .
      - name: Validate container CLI startup
        run: docker run --rm "${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.release_tag }}" --help
      - name: Push GHCR tags
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.release_tag }}"
          docker push "${{ steps.image.outputs.name }}:latest"
      - name: Export Docker image asset
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          docker save "${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.release_tag }}" \
            | zstd -T0 -15 -o GPU-Stress-Docker-CUDA12-x86_64.tar.zst
          printf '%s\n' \
            "${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.release_tag }}" \
            "${{ steps.image.outputs.name }}:latest" \
            > GPU-Stress-Docker-IMAGE.txt
          size="$(stat -c%s GPU-Stress-Docker-CUDA12-x86_64.tar.zst)"
          echo "asset_size_bytes=$size"
          test "$size" -lt 2000000000
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: |
            GPU-Stress-Docker-CUDA12-x86_64.tar.zst
            GPU-Stress-Docker-IMAGE.txt
          compression-level: 0
          retention-days: 3

  release:
    if: github.event_name != 'pull_request'
    needs: [prepare, windows-portable, linux-portable, docker-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt
          cd ..
          cat > release-notes.md <<'EOF'
          ## Quadro P2200 personal preset release

          The portable defaults are now **96 hours (345600 seconds)** and **87% target GPU utilization** whenever duration/load are omitted.

          ### Windows personal workflow

          - Double-click `GPU-Stress-P2200-Background.exe` for a completely hidden background run.
          - The detached worker is `GPU-Stress-P2200-Worker.exe`.
          - Stop it from CMD with `taskkill /F /T /IM GPU-Stress-P2200-Worker.exe`.
          - `START-P2200-96H-87.cmd`, `STOP-P2200-GPU-STRESS.cmd`, and the dedicated P2200 guide are included in the ZIP.

          ### Release formats

          - **Windows x64 portable app**: `GPU-Stress-Portable-Windows-x64.zip`
          - **Linux x64 portable folder**: `GPU-Stress-Portable-Linux-x64.tar.gz`
          - **Linux x86-64 AppImage**: `GPU-Stress-Portable-x86_64.AppImage`
          - **CUDA 12 Docker image archive**: `GPU-Stress-Docker-CUDA12-x86_64.tar.zst`

          The container is also published to GHCR. See `GPU-Stress-Docker-IMAGE.txt` for exact image tags.

          The portable packages bundle Python, CuPy, NVML bindings, and the CUDA 12 user-mode components used by the workload. A compatible NVIDIA driver is still required; Python, pip packages, and a system-wide CUDA Toolkit are not required.
          EOF
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "GPU Stress P2200 Personal Preset $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "GPU Stress P2200 Personal Preset $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          fi
