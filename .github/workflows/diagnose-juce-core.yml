name: Diagnose JUCE core

on:
  pull_request:
    paths:
      - native-juce/**
      - .github/workflows/diagnose-juce-core.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: |
          cmake -S native-juce -B build/juce-core \
            -DCMAKE_BUILD_TYPE=Release \
            -DGPU_STRESS_ENABLE_CUDA=OFF \
            -DGPU_STRESS_BUILD_GUI=OFF \
            -DGPU_STRESS_BUILD_TESTS=ON
      - name: Build with focused failure output
        id: build
        shell: bash
        run: |
          set +e
          cmake --build build/juce-core --parallel 2 > build/juce-core/build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ $status -ne 0 ]]; then
            tail -n 160 build/juce-core/build.log
          else
            tail -n 20 build/juce-core/build.log
          fi
          exit 0
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juce-core-build-log
          path: build/juce-core/build.log
          retention-days: 3
      - name: Fail when compile failed
        if: steps.build.outputs.status != '0'
        run: exit 1
      - name: Run tests and synthetic integration
        run: |
          ctest --test-dir build/juce-core --output-on-failure
          build/juce-core/GPU-Stress-JUCE-CLI --self-test
          build/juce-core/GPU-Stress-JUCE-CLI \
            --dry-run --duration 1 --load 87 \
            --output-dir build/juce-core/ci-runs
          test -f build/juce-core/ci-runs/gpu-stress-juce-console.log
          test -f build/juce-core/ci-runs/gpu-stress-juce-telemetry.csv
          test ! -f build/juce-core/ci-runs/gpu-stress-juce.pid
