name: JUCE WaveMix backup release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag for the JUCE backup implementation
        required: true
        default: juce-backup-v1.0.0
        type: string
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean
  push:
    branches: [main]
    paths: &juce-backup-paths
      - native-juce/**
      - docs/JUCE_WAVEMIX_BACKUP_GUIDE.md
      - .github/workflows/release-juce-backup.yml
      - README.md
  pull_request:
    paths: *juce-backup-paths

permissions:
  contents: write

concurrency:
  group: juce-wavemix-backup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
            prerelease="${{ inputs.prerelease }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            tag="juce-backup-pr-${{ github.event.pull_request.number }}-${GITHUB_RUN_NUMBER}"
            prerelease="true"
          else
            tag="juce-backup-v1.0.${GITHUB_RUN_NUMBER}"
            prerelease="false"
          fi
          tag="${tag#refs/tags/}"
          if [[ ! "$tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  core-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure host-only test build
        run: |
          cmake -S native-juce -B build/juce-core \
            -DCMAKE_BUILD_TYPE=Release \
            -DGPU_STRESS_ENABLE_CUDA=OFF \
            -DGPU_STRESS_BUILD_GUI=OFF \
            -DGPU_STRESS_BUILD_TESTS=ON
      - name: Build host-only tests
        run: cmake --build build/juce-core --parallel 2
      - name: Run CTest
        run: ctest --test-dir build/juce-core --output-on-failure
      - name: Run package self-test without CUDA
        run: build/juce-core/GPU-Stress-JUCE-CLI --self-test
      - name: Run end-to-end synthetic CLI
        run: |
          build/juce-core/GPU-Stress-JUCE-CLI \
            --dry-run --duration 1 --load 87 \
            --output-dir build/juce-core/ci-runs
          test -f build/juce-core/ci-runs/gpu-stress-juce-console.log
          test -f build/juce-core/ci-runs/gpu-stress-juce-telemetry.csv
          test ! -f build/juce-core/ci-runs/gpu-stress-juce.pid

  windows-release:
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.6.3'
          method: local
      - name: Confirm CUDA compiler
        shell: pwsh
        run: nvcc --version
      - name: Configure Windows JUCE CUDA build
        shell: pwsh
        run: |
          cmake -S native-juce -B build/juce-windows `
            -G "Visual Studio 17 2022" -A x64 `
            -DGPU_STRESS_ENABLE_CUDA=ON `
            -DGPU_STRESS_BUILD_GUI=ON `
            -DGPU_STRESS_BUILD_TESTS=ON `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      - name: Build Windows release
        shell: pwsh
        run: cmake --build build/juce-windows --config Release --parallel 2
      - name: Run native tests
        shell: pwsh
        run: ctest --test-dir build/juce-windows -C Release --output-on-failure
      - name: Assemble Windows bundle
        shell: pwsh
        run: |
          $bundle = Join-Path $PWD "dist\GPU-Stress-JUCE-Backup-Windows-x64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null

          $gui = Get-ChildItem build\juce-windows -Recurse -Filter "GPU-Stress-JUCE.exe" |
            Select-Object -First 1
          $cli = Get-ChildItem build\juce-windows -Recurse -Filter "GPU-Stress-JUCE-CLI.exe" |
            Select-Object -First 1
          if (-not $gui -or -not $cli) { throw "Built JUCE GUI or CLI executable was not found" }

          Copy-Item $gui.FullName (Join-Path $bundle "GPU-Stress-JUCE.exe")
          Copy-Item $gui.FullName (Join-Path $bundle "GPU-Stress-JUCE-Background.exe")
          Copy-Item $cli.FullName (Join-Path $bundle "GPU-Stress-JUCE-CLI.exe")
          Copy-Item native-juce\packaging\windows\*.cmd $bundle
          Copy-Item docs\JUCE_WAVEMIX_BACKUP_GUIDE.md $bundle
          Copy-Item native-juce\THIRD_PARTY_NOTICES.md $bundle
          Copy-Item native-juce\README.md (Join-Path $bundle "README-JUCE-BACKUP.md")
          Copy-Item build\juce-windows\_deps\juce-src\LICENSE.md `
            (Join-Path $bundle "JUCE-LICENSE.md")
          Set-Content -Path (Join-Path $bundle "SOURCE-COMMIT.txt") -Value $env:GITHUB_SHA
      - name: Validate Windows package
        shell: pwsh
        run: |
          $bundle = Join-Path $PWD "dist\GPU-Stress-JUCE-Backup-Windows-x64"
          & (Join-Path $bundle "GPU-Stress-JUCE-CLI.exe") --help
          & (Join-Path $bundle "GPU-Stress-JUCE-CLI.exe") --self-test
          if ($LASTEXITCODE -ne 0) { throw "CLI self-test failed" }

          $gui = Start-Process (Join-Path $bundle "GPU-Stress-JUCE.exe") `
            -ArgumentList "--gui-smoke" -PassThru
          if (-not $gui.WaitForExit(15000)) { $gui.Kill(); throw "GUI smoke test timed out" }
          if ($gui.ExitCode -ne 0) { throw "GUI smoke test failed" }

          $runDir = Join-Path $bundle "CI-Background-Runs"
          $background = Start-Process (Join-Path $bundle "GPU-Stress-JUCE-Background.exe") `
            -ArgumentList "--dry-run","--duration","1","--load","87","--output-dir",$runDir `
            -PassThru
          if (-not $background.WaitForExit(15000)) {
            $background.Kill()
            throw "Background dry-run timed out"
          }
          if ($background.ExitCode -ne 0) { throw "Background dry-run failed" }
          if (-not (Test-Path (Join-Path $runDir "gpu-stress-juce-console.log"))) {
            throw "Background log is missing"
          }
          if (-not (Test-Path (Join-Path $runDir "gpu-stress-juce-telemetry.csv"))) {
            throw "Background CSV is missing"
          }
          if (Test-Path (Join-Path $runDir "gpu-stress-juce.pid")) {
            throw "PID file was not cleaned up"
          }
          Remove-Item -Recurse -Force $runDir
      - name: Package Windows ZIP
        shell: pwsh
        run: |
          $asset = "GPU-Stress-JUCE-Backup-Windows-x64.zip"
          Compress-Archive -Path "dist\GPU-Stress-JUCE-Backup-Windows-x64\*" `
            -DestinationPath $asset -CompressionLevel Optimal
          $size = (Get-Item $asset).Length
          Write-Host "asset_size_bytes=$size"
          if ($size -ge 2000000000) { throw "Windows release asset exceeds 2 GB" }
      - uses: actions/upload-artifact@v4
        with:
          name: juce-windows
          path: GPU-Stress-JUCE-Backup-Windows-x64.zip
          compression-level: 0
          retention-days: 3

  linux-release:
    needs: prepare
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.6.3-devel-ubuntu22.04
    timeout-minutes: 150
    steps:
      - name: Install build and JUCE dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates cmake curl file git g++ make ninja-build pkg-config xz-utils \
            libasound2-dev libfontconfig1-dev libfreetype6-dev libgl1-mesa-dev \
            libgtk-3-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev xvfb xauth
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v4
      - name: Confirm CUDA compiler
        run: nvcc --version
      - name: Configure Linux JUCE CUDA build
        run: |
          cmake -S native-juce -B build/juce-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGPU_STRESS_ENABLE_CUDA=ON \
            -DGPU_STRESS_BUILD_GUI=ON \
            -DGPU_STRESS_BUILD_TESTS=ON
      - name: Build Linux release
        run: cmake --build build/juce-linux --parallel 2
      - name: Run native tests
        run: ctest --test-dir build/juce-linux --output-on-failure
      - name: Assemble Linux bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle="$PWD/dist/GPU-Stress-JUCE-Backup-Linux-x64"
          mkdir -p "$bundle"
          gui="$(find build/juce-linux -type f -name GPU-Stress-JUCE -perm -111 | head -n1)"
          cli="$(find build/juce-linux -type f -name GPU-Stress-JUCE-CLI -perm -111 | head -n1)"
          test -n "$gui" && test -n "$cli"
          cp "$gui" "$bundle/GPU-Stress-JUCE"
          cp "$gui" "$bundle/GPU-Stress-JUCE-Background"
          cp "$cli" "$bundle/GPU-Stress-JUCE-CLI"
          cp docs/JUCE_WAVEMIX_BACKUP_GUIDE.md "$bundle/"
          cp native-juce/THIRD_PARTY_NOTICES.md "$bundle/"
          cp native-juce/README.md "$bundle/README-JUCE-BACKUP.md"
          cp build/juce-linux/_deps/juce-src/LICENSE.md "$bundle/JUCE-LICENSE.md"
          printf '%s\n' "$GITHUB_SHA" > "$bundle/SOURCE-COMMIT.txt"
      - name: Validate Linux package
        shell: bash
        run: |
          set -euo pipefail
          bundle="$PWD/dist/GPU-Stress-JUCE-Backup-Linux-x64"
          "$bundle/GPU-Stress-JUCE-CLI" --help
          "$bundle/GPU-Stress-JUCE-CLI" --self-test
          xvfb-run -a "$bundle/GPU-Stress-JUCE" --gui-smoke
          run_dir="$bundle/CI-Background-Runs"
          xvfb-run -a "$bundle/GPU-Stress-JUCE-Background" \
            --dry-run --duration 1 --load 87 --output-dir "$run_dir"
          test -f "$run_dir/gpu-stress-juce-console.log"
          test -f "$run_dir/gpu-stress-juce-telemetry.csv"
          test ! -f "$run_dir/gpu-stress-juce.pid"
          rm -rf "$run_dir"
      - name: Package Linux tar archive
        run: |
          tar -C dist -czf GPU-Stress-JUCE-Backup-Linux-x64.tar.gz \
            GPU-Stress-JUCE-Backup-Linux-x64
          size="$(stat -c%s GPU-Stress-JUCE-Backup-Linux-x64.tar.gz)"
          echo "tar_asset_size_bytes=$size"
          test "$size" -lt 2000000000
      - name: Build and smoke-test AppImage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          gui="$PWD/dist/GPU-Stress-JUCE-Backup-Linux-x64/GPU-Stress-JUCE"
          cli="$PWD/dist/GPU-Stress-JUCE-Backup-Linux-x64/GPU-Stress-JUCE-CLI"

          curl --fail --location --retry 3 \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable "$gui" \
            --desktop-file native-juce/packaging/appimage/gpu-stress-juce.desktop \
            --icon-file native-juce/packaging/appimage/gpu-stress-juce.svg

          cp "$cli" AppDir/usr/bin/GPU-Stress-JUCE-CLI
          cp native-juce/packaging/appimage/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          cp docs/JUCE_WAVEMIX_BACKUP_GUIDE.md AppDir/
          cp native-juce/THIRD_PARTY_NOTICES.md AppDir/
          cp build/juce-linux/_deps/juce-src/LICENSE.md AppDir/JUCE-LICENSE.md

          curl --fail --location --retry 3 \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage \
            AppDir GPU-Stress-JUCE-Backup-x86_64.AppImage
          chmod +x GPU-Stress-JUCE-Backup-x86_64.AppImage
          xvfb-run -a env APPIMAGE_EXTRACT_AND_RUN=1 \
            ./GPU-Stress-JUCE-Backup-x86_64.AppImage --gui-smoke
          size="$(stat -c%s GPU-Stress-JUCE-Backup-x86_64.AppImage)"
          echo "appimage_asset_size_bytes=$size"
          test "$size" -lt 2000000000
      - uses: actions/upload-artifact@v4
        with:
          name: juce-linux
          path: |
            GPU-Stress-JUCE-Backup-Linux-x64.tar.gz
            GPU-Stress-JUCE-Backup-x86_64.AppImage
          compression-level: 0
          retention-days: 3

  release:
    if: github.event_name != 'pull_request'
    needs: [prepare, core-tests, windows-release, linux-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' \
            | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cd ..
          cat > release-notes.md <<'EOF'
          ## JUCE WaveMix backup implementation

          This is an independent native backup for the Quadro P2200 workflow.

          - **GUI:** JUCE 8.0.14 desktop control panel
          - **No-window mode:** `GPU-Stress-JUCE-Background.exe`
          - **CLI:** `GPU-Stress-JUCE-CLI.exe`
          - **Default:** 96 hours / 87% target duty load
          - **Strategy:** custom CUDA WaveMix short kernels, not cuBLAS GEMM
          - **Control:** measured active-time duty windows, not NVML PI feedback
          - **Architecture:** includes `sm_61` for Quadro P2200

          Windows bundles include start/stop/status CMD files and a dedicated Traditional Chinese guide. Linux is provided as both a portable folder archive and AppImage.

          The package tests cover configuration, scheduler math, engine completion/stop/error paths, thermal hysteresis, logging/PID cleanup, CLI self-test, GUI smoke tests, hidden background dry-runs, CUDA compilation, and AppImage startup.

          A compatible NVIDIA driver is still required for the real CUDA backend. GitHub-hosted runners cannot execute the kernel on a physical Quadro P2200, so the release should first be validated with a short 25% run on the target machine.
          EOF
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "GPU Stress JUCE WaveMix Backup $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "GPU Stress JUCE WaveMix Backup $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          fi
