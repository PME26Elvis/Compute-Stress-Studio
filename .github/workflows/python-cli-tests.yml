name: Python CLI tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cpu-only-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile CLI modules
        run: python -m py_compile cpu_stress_cli.py gpu_stress_cli.py gpu_stress_portable.py gpu_stress_background.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check GPU CLI help
        run: |
          python gpu_stress_cli.py --help
          python gpu_stress_portable.py --help
